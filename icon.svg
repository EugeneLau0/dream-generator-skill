<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8aaff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#7b4fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a00cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonFill" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#e8d8ff"/>
      <stop offset="50%" stop-color="#a97cff"/>
      <stop offset="100%" stop-color="#5b2be0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7b4fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff00c8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ring2Grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00c8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g clip-path="url(#circleClip)" filter="url(#starGlow)">
    <circle cx="60" cy="80" r="1.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="130" cy="45" r="1" fill="#c8aaff" opacity="0.8"/>
    <circle cx="200" cy="70" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="320" cy="40" r="1.5" fill="#00f5ff" opacity="0.8"/>
    <circle cx="420" cy="90" r="1" fill="#ffffff" opacity="0.9"/>
    <circle cx="460" cy="55" r="2" fill="#c8aaff" opacity="0.6"/>
    <circle cx="80" cy="160" r="1" fill="#ffffff" opacity="0.5"/>
    <circle cx="380" cy="130" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="440" cy="200" r="1" fill="#00f5ff" opacity="0.6"/>
    <circle cx="50" cy="300" r="1.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="470" cy="340" r="1" fill="#c8aaff" opacity="0.7"/>
    <circle cx="90" cy="420" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="400" cy="430" r="1.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="170" cy="460" r="1" fill="#00f5ff" opacity="0.6"/>
    <circle cx="340" cy="470" r="1.5" fill="#c8aaff" opacity="0.7"/>
    <circle cx="110" cy="240" r="1" fill="#ffffff" opacity="0.4"/>
    <circle cx="480" cy="270" r="1.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Outer halo glow -->
  <circle cx="256" cy="220" r="130" fill="url(#moonGlow)" opacity="0.35" clip-path="url(#circleClip)"/>

  <!-- Saturn-style ring - back half -->
  <ellipse cx="256" cy="245" rx="185" ry="38"
    fill="none" stroke="url(#ring2Grad)" stroke-width="5" opacity="0.5"
    stroke-dasharray="580 10" clip-path="url(#circleClip)"/>

  <!-- Moon body -->
  <circle cx="256" cy="210" r="108" fill="url(#moonFill)" filter="url(#softGlow)" clip-path="url(#circleClip)"/>

  <!-- Moon surface craters (sci-fi style) -->
  <circle cx="220" cy="185" r="18" fill="none" stroke="#c8aaff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="220" cy="185" r="8" fill="#6a2be0" opacity="0.5"/>
  <circle cx="285" cy="240" r="12" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="285" cy="240" r="5" fill="#3a00cc" opacity="0.4"/>
  <circle cx="245" cy="230" r="6" fill="none" stroke="#c8aaff" stroke-width="1" opacity="0.3"/>

  <!-- Hex grid overlay on moon (sci-fi detail) -->
  <g opacity="0.12" clip-path="url(#circleClip)">
    <line x1="180" y1="150" x2="330" y2="150" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="165" y1="175" x2="345" y2="175" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="155" y1="200" x2="355" y2="200" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="155" y1="225" x2="355" y2="225" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="165" y1="250" x2="345" y2="250" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="220" y1="140" x2="220" y2="280" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="256" y1="105" x2="256" y2="315" stroke="#00f5ff" stroke-width="0.8"/>
    <line x1="290" y1="140" x2="290" y2="280" stroke="#00f5ff" stroke-width="0.8"/>
  </g>

  <!-- Moon terminator shadow (crescent sci-fi edge) -->
  <path d="M 256 102 A 108 108 0 0 0 256 318 A 60 108 0 0 1 256 102 Z"
    fill="#0d0d2b" opacity="0.38"/>

  <!-- Moon edge glow -->
  <circle cx="256" cy="210" r="108" fill="none" stroke="#c8aaff" stroke-width="1.5" opacity="0.6" filter="url(#glow)" clip-path="url(#circleClip)"/>
  <circle cx="256" cy="210" r="112" fill="none" stroke="#7b4fff" stroke-width="1" opacity="0.3" clip-path="url(#circleClip)"/>

  <!-- Saturn-style ring - front half -->
  <path d="M 71 245 A 185 38 0 0 0 441 245"
    fill="none" stroke="url(#ringGrad)" stroke-width="6" opacity="0.85" filter="url(#glow)" clip-path="url(#circleClip)"/>

  <!-- Data stream lines (sci-fi) -->
  <g filter="url(#glow)" clip-path="url(#circleClip)" opacity="0.7">
    <line x1="130" y1="340" x2="256" y2="318" stroke="#00f5ff" stroke-width="1" stroke-dasharray="4 6" opacity="0.6"/>
    <line x1="380" y1="330" x2="256" y2="318" stroke="#ff00c8" stroke-width="1" stroke-dasharray="4 6" opacity="0.6"/>
    <line x1="175" y1="380" x2="256" y2="318" stroke="#7b4fff" stroke-width="1" stroke-dasharray="3 8" opacity="0.5"/>
  </g>

  <!-- Bottom text scan line (sci-fi HUD) -->
  <g clip-path="url(#circleClip)" opacity="0.5">
    <line x1="80" y1="390" x2="432" y2="390" stroke="#00f5ff" stroke-width="0.6" opacity="0.4"/>
    <rect x="100" y="396" width="60" height="3" rx="1" fill="#00f5ff" opacity="0.25"/>
    <rect x="170" y="396" width="30" height="3" rx="1" fill="#7b4fff" opacity="0.25"/>
    <rect x="210" y="396" width="90" height="3" rx="1" fill="#00f5ff" opacity="0.2"/>
    <rect x="310" y="396" width="45" height="3" rx="1" fill="#ff00c8" opacity="0.25"/>
  </g>

  <!-- Corner HUD brackets -->
  <g stroke="#00f5ff" stroke-width="2" fill="none" opacity="0.5" clip-path="url(#circleClip)">
    <path d="M 55 75 L 55 55 L 75 55"/>
    <path d="M 457 75 L 457 55 L 437 55"/>
    <path d="M 55 437 L 55 457 L 75 457"/>
    <path d="M 457 437 L 457 457 L 437 457"/>
  </g>

  <!-- Outer border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#7b4fff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="252" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.2"/>
</svg>
